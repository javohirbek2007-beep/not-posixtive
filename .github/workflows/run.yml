name: Run HTB exploit

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  exploit:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show files
        run: ls -la && find . -maxdepth 3 -type f

      - name: Run exploit
        run: python3 speedrun.py
