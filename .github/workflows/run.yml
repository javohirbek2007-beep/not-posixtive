name: Run exploit

on:
  workflow_dispatch:

jobs:
  exploit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pwntools
        run: |
          python -m pip install --upgrade pip
          pip install pwntools

      - name: Run exploit
        run: python speedrun.py
